<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamaljit Kaur Grewal - Software Developer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            text-align: center;
            background: white;
            padding: 40px 20px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
            margin: 20px;
        }
        
        h1 {
            font-size: clamp(2em, 8vw, 3em);
            margin-bottom: 10px;
            color: #667eea;
        }
        
        .title {
            font-size: clamp(1.2em, 5vw, 1.5em);
            color: #764ba2;
            margin-bottom: 30px;
            font-weight: 500;
        }
        
        .description {
            font-size: clamp(1em, 4vw, 1.1em);
            color: #555;
            margin-bottom: 40px;
            line-height: 1.8;
        }
        
        .cta-button {
            display: inline-block;
            padding: 12px 30px;
            margin: 10px 5px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s ease;
            font-weight: 600;
            font-size: clamp(0.9em, 3vw, 1em);
        }
        
        .cta-button:hover {
            background: #764ba2;
        }
        
        .social-links {
            margin-top: 40px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }
        
        .social-links a {
            display: inline-block;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
            font-size: clamp(0.9em, 3vw, 1em);
        }
        
        .social-links a:hover {
            color: #764ba2;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 20px;
            }
            
            .container {
                padding: 30px 20px;
            }
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 25px 15px;
                margin: 10px;
            }
            
            .cta-button {
                display: block;
                width: 100%;
                margin: 10px 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Kamaljit Kaur Grewal</h1>
        <p class="title">Software Developer</p>
        <p class="description">
            Welcome to my portfolio. I'm passionate about creating elegant solutions to complex problems through clean, efficient code.
        </p>
        <a href="#portfolio" class="cta-button">View My Work</a>
        <a href="#contact" class="cta-button">Get In Touch</a>
        <div class="social-links">
            <a href="#">GitHub</a>
            <a href="#">LinkedIn</a>
            <a href="#">Twitter</a>
        </div>
    </div>
</body>
</html>
